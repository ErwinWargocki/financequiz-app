name: finquiz
description: FinQuiz - Financial Literacy App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  fl_chart: ^0.66.0
  animate_do: ^3.3.4
  cupertino_icons: ^1.0.6
  lottie: ^3.1.0
  percent_indicator: ^4.2.3
  flutter_staggered_animations: ^1.1.1
  crypto: ^3.0.3
  flutter_riverpod: ^3.3.1
  hooks_riverpod: ^3.3.1
  flutter_hooks: ^0.21.3+1
  riverpod_annotation: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^4.0.3
  build_runner: ^2.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
